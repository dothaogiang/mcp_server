version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hr
      POSTGRES_PASSWORD: hr
      POSTGRES_DB: hr_archive
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mcp-server:
    build: .
    command: python main.py
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant

  webhook:
    build: .
    command: python run_webhook.py
    env_file: .env
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - qdrant

  scheduler:
    build: .
    command: python sync/scheduler.py
    env_file: .env
    depends_on:
      - postgres
      - qdrant

volumes:
  pg_data:
  qdrant_data:
